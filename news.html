<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новини — Print MY Mind</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #B7B7B7;
            --text-dark: #332C26;
        }
        html {
            background-color: var(--bg) !important;
            background-image: radial-gradient(circle at 20% 20%, rgba(0,0,0,0.06) 0.8px, transparent 1px),
                              radial-gradient(circle at 80% 80%, rgba(0,0,0,0.04) 0.9px, transparent 1.2px),
                              linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.04));
            background-size: 10px 10px, 14px 14px, 100% 100%;
            background-repeat: repeat, repeat, no-repeat;
            background-attachment: fixed;
        }
        body{font-family:'Montserrat',sans-serif;background:transparent;color:var(--text-dark);padding:20px;}
        h1{font-size:32px;text-align:center;margin-bottom:40px;}
        .article{background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.06);border-radius:20px;padding:20px;margin-bottom:30px;}
        .article img{max-width:100%;border-radius:15px;margin-top:15px;}
        .article-title{font-size:24px;font-weight:700;margin-bottom:10px;}
        .article-text{font-size:16px;line-height:1.6;}
    </style>
</head>
<body>
    <h1>Новини Print MY Mind</h1>
    <div id="news-container">
        <p>Завантаження...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyCoMilBNzczqZh_KVJVwvpt24EOgK5NnHQ",
            authDomain: "hapevasek.firebaseapp.com",
            databaseURL: "https://hapevasek-default-rtdb.firebaseio.com",
            projectId: "hapevasek",
            storageBucket: "hapevasek.firebasestorage.app",
            appId: "1:534239781720:web:c1777589cf46d5cff97b2d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function renderNews(items){
            const container = document.getElementById('news-container');
            if(!items || Object.keys(items).length===0){
                container.innerHTML = '<p>Новин поки що немає.</p>';
                return;
            }
            const params = new URLSearchParams(window.location.search);
            const filterType = params.get('type'); // 'world' or 'grow'

            let worldHtml = '<h2>Новини в світі канабісу</h2>';
            let growHtml = '<h2>Інформація для грову</h2>';
            let hasWorld = false;
            let hasGrow = false;

            Object.values(items).forEach(a => {
                const itemHtml = `<div class="article">
                    <div class="article-text">${a.text||''}</div>` +
                    (a.img?`<img src="${a.img}" alt="">`:'') +
                    `</div>`;
                if(a.type === 'grow'){
                    hasGrow = true;
                    growHtml += itemHtml;
                } else {
                    hasWorld = true;
                    worldHtml += itemHtml;
                }
            });

            let finalHtml = '';
            if(!filterType || filterType === 'world') {
                if(hasWorld) finalHtml += worldHtml;
            }
            if(!filterType || filterType === 'grow') {
                if(hasGrow) finalHtml += growHtml;
            }
            if(finalHtml === ''){
                finalHtml = '<p>Новин поки що немає.</p>';
            }
            container.innerHTML = finalHtml;
        }

        onValue(ref(db,'news'), snapshot => {
            renderNews(snapshot.val());
        });
    </script>
</body>
</html>
